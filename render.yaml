services:
  # Backend Service
  - type: web
    name: cafe-bosque-api
    env: node
    repo: https://github.com/TU_USERNAME/cafe-menu-app.git
    rootDir: server
    buildCommand: cd .. && npm install && cd server && npm install
    startCommand: cd .. && npm run server
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    healthCheckPath: /api/menu
    autoDeploy: true
